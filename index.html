<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Weather Chatbot</title>

  <!-- Chatroom styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/themes/theme2.css" />

  <!-- 🌤️ Custom Weather Styling -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to top, #87ceeb, #e0f7ff);
      height: 100vh;
      overflow: hidden;
    }

    /* Soft cloud overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("https://images.unsplash.com/photo-1501630834273-4b5604d2ee31");
      background-size: cover;
      background-position: center;
      opacity: 0.15;
      z-index: -1;
    }

    .chat-container {
      width: 380px;
      height: 520px;
      margin: 40px auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      border-radius: 15px;
      overflow: hidden;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(6px);
    }

    /* Header feel */
    .chat-container .title {
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="chat-container"></div>

  <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>

  <script>
    if (!window.Chatroom) {
      document.body.insertAdjacentHTML('beforeend',
        '<div style="padding:12px;color:#fff;background:#c00">Could not load Chatroom.js</div>');
    }

    var chatroom = new window.Chatroom({
      host: "https://didactic-winner-vpvp54g96vvwhw6j5-5005.app.github.dev",
      title: "🌤️ Weather Bot",
      container: document.querySelector(".chat-container"),
      welcomeMessage: "Hi! Ask me about weather anywhere 🌦️",
      speechRecognition: "en-US",
      voiceLang: "en-US"
    });

    chatroom.openChat();
  </script>
</body>
</html>
